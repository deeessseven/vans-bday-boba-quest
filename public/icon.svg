<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000033"/>
      <stop offset="100%" stop-color="#001155"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#aaddff"/>
      <stop offset="100%" stop-color="#4488cc"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>
  <!-- Crystal gem: top facets (bright) -->
  <polygon points="256,60 380,230 256,200 132,230" fill="url(#gem)" opacity="0.95"/>
  <!-- Crystal gem: bottom facets (darker) -->
  <polygon points="256,200 380,230 256,440 132,230" fill="#224488" opacity="0.95"/>
  <!-- Left highlight facet -->
  <polygon points="256,60 192,160 132,230 256,200" fill="#6699bb" opacity="0.6"/>
  <!-- Inner shine -->
  <polygon points="256,80 310,200 256,185 202,200" fill="#ffffff" opacity="0.35"/>
  <!-- Rim glow dots -->
  <circle cx="256" cy="56" r="10" fill="#aaddff" opacity="0.8"/>
</svg>
